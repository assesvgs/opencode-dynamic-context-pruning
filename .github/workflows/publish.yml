name: Build

on:
    workflow_dispatch:
    push:
        branches:
            - master

permissions:
    contents: read

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: false

jobs:
    build:
        name: Build & Upload Artifact
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.x"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Format check
              run: npm run format:check

            - name: Type check
              run: npm run typecheck

            - name: Test
              run: npm test

            - name: Build
              run: npm run build

            - name: Prepare plugin package
              run: |
                  mkdir -p dist
                  cp package.json tui.tsx README.md dist/
                  node -e "
                    const pkg = require('./package.json');
                    pkg.main = './index.js';
                    pkg.types = './index.d.ts';
                    pkg.exports = { ...pkg.exports, '.': { types: './index.d.ts', import: './index.js' } };
                    delete pkg.scripts;
                    delete pkg.devDependencies;
                    delete pkg.overrides;
                    // Remove npm-specific fields not needed for local install
                    delete pkg.files;
                    delete pkg.keywords;
                    require('fs').writeFileSync('dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
                  "

            - name: Set short SHA
              id: vars
              run: echo "short_sha=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dcp-${{ steps.vars.outputs.short_sha }}
                  path: dist/
                  if-no-files-found: error
